<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Buxgalter AI</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #ffffff);
    --bg2: var(--tg-theme-secondary-bg-color, #f5f5f5);
    --text: var(--tg-theme-text-color, #111111);
    --hint: var(--tg-theme-hint-color, #888888);
    --btn: var(--tg-theme-button-color, #2481cc);
    --btn-text: var(--tg-theme-button-text-color, #ffffff);
    --accent: #2481cc;
    --green: #22c55e;
    --red: #ef4444;
    --border: #e5e5e5;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  /* NAV */
  .nav { display: flex; position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--border); z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 4px 6px; cursor: pointer; font-size: 10px; color: var(--hint); gap: 3px; border: none; background: none; }
  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 22px; }

  /* PAGES */
  .page { display: none; padding: 16px 16px 80px; }
  .page.active { display: block; }

  /* CARDS */
  .card { background: var(--bg2); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
  .card-row { display: flex; align-items: center; gap: 10px; }
  .card-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .card-info { flex: 1; min-width: 0; }
  .card-name { font-weight: 700; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-sub { font-size: 12px; color: var(--hint); margin-top: 2px; }
  .card-actions { display: flex; gap: 6px; }

  /* BADGES */
  .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; }
  .badge-blue { background: #dbeafe; color: #1d4ed8; }
  .badge-green { background: #dcfce7; color: #15803d; }
  .badge-yellow { background: #fef9c3; color: #a16207; }
  .badge-red { background: #fee2e2; color: #b91c1c; }

  /* BUTTONS */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 18px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: opacity .15s; }
  .btn:active { opacity: .75; }
  .btn-primary { background: var(--btn); color: var(--btn-text); width: 100%; }
  .btn-ghost { background: var(--bg2); color: var(--text); }
  .btn-danger { background: #fee2e2; color: var(--red); }
  .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }
  .btn-icon { width: 32px; height: 32px; padding: 0; border-radius: 8px; }

  /* FORM */
  .form-group { margin-bottom: 12px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--hint); margin-bottom: 4px; display: block; }
  .form-input { width: 100%; padding: 11px 14px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--bg); color: var(--text); font-size: 15px; outline: none; }
  .form-input:focus { border-color: var(--accent); }
  .form-select { width: 100%; padding: 11px 14px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--bg); color: var(--text); font-size: 15px; outline: none; appearance: none; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200; display: none; align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg); border-radius: 20px 20px 0 0; padding: 20px 16px 32px; width: 100%; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }

  /* SECTION */
  .section-title { font-size: 13px; font-weight: 700; color: var(--hint); margin: 16px 0 8px; text-transform: uppercase; letter-spacing: .5px; }

  /* CALC */
  .calc-result { background: var(--bg2); border-radius: var(--radius); padding: 14px; margin-top: 12px; display: none; }
  .calc-result.show { display: block; }
  .calc-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .calc-row:last-child { border-bottom: none; font-weight: 700; font-size: 15px; }
  .calc-val { font-weight: 600; }

  /* ACTIVE INDICATOR */
  .active-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

  /* HEADER */
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .header-title { font-size: 20px; font-weight: 800; }

  /* SUBSCRIPTION */
  .sub-card { background: linear-gradient(135deg, #1d4ed8, #2563eb); color: white; border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .sub-plan { font-size: 20px; font-weight: 800; }
  .sub-desc { font-size: 13px; opacity: .85; margin-top: 2px; }
  .progress-bar { height: 6px; border-radius: 3px; background: rgba(255,255,255,.3); margin-top: 10px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; background: white; }

  /* EMPTY */
  .empty { text-align: center; padding: 40px 20px; color: var(--hint); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 15px; }
</style>
</head>
<body>

<!-- ══ PAGES ══════════════════════════════════════════════════════ -->

<!-- COMPANIES -->
<div class="page active" id="page-companies">
  <div class="header">
    <div class="header-title">🏢 Компании</div>
    <button class="btn btn-ghost btn-sm" onclick="openAddModal()">+ Добавить</button>
  </div>
  <div id="companies-list"></div>
</div>

<!-- CALCULATORS -->
<div class="page" id="page-calc">
  <div class="header"><div class="header-title">🧮 Калькуляторы</div></div>

  <div class="section-title">НДС (QQS)</div>
  <div class="card">
    <div class="form-group">
      <label class="form-label">Тип расчёта</label>
      <select class="form-select" id="nds-type">
        <option value="on">Начислить НДС на сумму</option>
        <option value="off">Выделить НДС из суммы</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Сумма (сум)</label>
      <input class="form-input" type="number" id="nds-amount" placeholder="10 000 000">
    </div>
    <button class="btn btn-primary" onclick="calcNDS()">Рассчитать</button>
    <div class="calc-result" id="nds-result"></div>
  </div>

  <div class="section-title">Зарплата</div>
  <div class="card">
    <div class="form-group">
      <label class="form-label">Начисленная зарплата gross (сум)</label>
      <input class="form-input" type="number" id="sal-amount" placeholder="5 000 000">
    </div>
    <button class="btn btn-primary" onclick="calcSalary()">Рассчитать</button>
    <div class="calc-result" id="sal-result"></div>
  </div>

  <div class="section-title">Налог на прибыль / УСН</div>
  <div class="card">
    <div class="form-group">
      <label class="form-label">Система налогообложения</label>
      <select class="form-select" id="tax-system">
        <option value="usn">УСН — 4% от выручки</option>
        <option value="profit">Налог на прибыль — 15%</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Выручка (сум)</label>
      <input class="form-input" type="number" id="tax-revenue" placeholder="500 000 000">
    </div>
    <div id="expenses-row" style="display:none" class="form-group">
      <label class="form-label">Расходы (сум)</label>
      <input class="form-input" type="number" id="tax-expenses" placeholder="350 000 000">
    </div>
    <button class="btn btn-primary" onclick="calcTax()">Рассчитать</button>
    <div class="calc-result" id="tax-result"></div>
  </div>
</div>

<!-- PROFILE -->
<div class="page" id="page-profile">
  <div class="header"><div class="header-title">👤 Профиль</div></div>

  <div class="sub-card">
    <div class="sub-plan">🆓 Бесплатный</div>
    <div class="sub-desc">Осталось запросов в этом месяце</div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">
      <span style="font-size:22px;font-weight:800" id="requests-left">10</span>
      <span style="font-size:13px;opacity:.8">из 10</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:100%"></div></div>
  </div>

  <div class="section-title">Тарифы</div>
  <div class="card" style="margin-bottom:8px">
    <div class="card-row">
      <div class="card-icon" style="background:#f0fdf4">🥈</div>
      <div class="card-info">
        <div class="card-name">Базовый</div>
        <div class="card-sub">100 запросов/месяц · Все калькуляторы</div>
      </div>
      <div style="font-weight:700;font-size:15px;color:var(--accent)">50K</div>
    </div>
  </div>
  <div class="card" style="margin-bottom:8px">
    <div class="card-row">
      <div class="card-icon" style="background:#eff6ff">🥇</div>
      <div class="card-info">
        <div class="card-name">Профи</div>
        <div class="card-sub">Безлимит · Шаблоны документов</div>
      </div>
      <div style="font-weight:700;font-size:15px;color:var(--accent)">100K</div>
    </div>
  </div>
  <div class="card">
    <div class="card-row">
      <div class="card-icon" style="background:#faf5ff">🏢</div>
      <div class="card-info">
        <div class="card-name">Бизнес</div>
        <div class="card-sub">До 10 компаний · API доступ</div>
      </div>
      <div style="font-weight:700;font-size:15px;color:var(--accent)">300K</div>
    </div>
  </div>
  <button class="btn btn-primary" style="margin-top:8px" onclick="Telegram.WebApp.showAlert('Оплата скоро будет доступна через Payme и Click!')">Подключить тариф</button>

  <div class="section-title">Язык</div>
  <div class="card">
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" style="flex:1" id="btn-ru" onclick="setLang('ru')">🇷🇺 Русский</button>
      <button class="btn btn-ghost" style="flex:1" id="btn-uz" onclick="setLang('uz')">🇺🇿 O'zbek</button>
    </div>
  </div>
</div>

<!-- ══ BOTTOM NAV ══════════════════════════════════════════════ -->
<nav class="nav">
  <button class="nav-btn active" id="nav-companies" onclick="showPage('companies')">
    <span class="nav-icon">🏢</span>Компании
  </button>
  <button class="nav-btn" id="nav-calc" onclick="showPage('calc')">
    <span class="nav-icon">🧮</span>Расчёты
  </button>
  <button class="nav-btn" id="nav-profile" onclick="showPage('profile')">
    <span class="nav-icon">👤</span>Профиль
  </button>
</nav>

<!-- ══ ADD COMPANY MODAL ══════════════════════════════════════ -->
<div class="modal-overlay" id="add-modal" onclick="closeAddModal(event)">
  <div class="modal">
    <div class="modal-title">Добавить компанию</div>
    <div class="form-group">
      <label class="form-label">Название</label>
      <input class="form-input" id="f-name" placeholder="Alif Trade ООО">
    </div>
    <div class="form-group">
      <label class="form-label">Тип</label>
      <select class="form-select" id="f-type">
        <option>ООО</option>
        <option>ИП (ЯТТШ)</option>
        <option>АО</option>
        <option>Частное лицо</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Система налогообложения</label>
      <select class="form-select" id="f-tax">
        <option>УСН 4%</option>
        <option>ОСНО + НДС</option>
        <option>Фиксированный налог</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Примерный оборот</label>
      <select class="form-select" id="f-turnover">
        <option>до 100 млн сум</option>
        <option>100–500 млн сум</option>
        <option>500 млн – 1 млрд сум</option>
        <option>свыше 1 млрд сум</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">ИНН (необязательно)</label>
      <input class="form-input" id="f-inn" placeholder="123456789" type="number">
    </div>
    <button class="btn btn-primary" onclick="saveCompany()">Сохранить</button>
    <button class="btn btn-ghost" style="margin-top:8px;width:100%" onclick="closeAddModal()">Отмена</button>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
tg.ready();

const userId = String(tg.initDataUnsafe?.user?.id || 'demo');
const API = '';  // same origin

let state = { companies: [], active: null, lang: 'ru', requests_left: 10 };

// ── Load user data ─────────────────────────────────────────────
async function loadUser() {
  try {
    const r = await fetch(`${API}/api/user/${userId}`);
    state = await r.json();
  } catch(e) {
    console.log('Offline mode');
  }
  renderCompanies();
  renderProfile();
}

// ── Navigation ─────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
}

// ── Companies ──────────────────────────────────────────────────
const ICONS = { 'ООО': '🏢', 'ИП (ЯТТШ)': '👤', 'АО': '🏛', 'Частное лицо': '🙋' };
const TAX_COLORS = { 'УСН 4%': 'badge-green', 'ОСНО + НДС': 'badge-blue', 'Фиксированный налог': 'badge-yellow' };

function renderCompanies() {
  const list = document.getElementById('companies-list');
  if (!state.companies.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">🏢</div><div class="empty-text">Добавьте первую компанию</div></div>`;
    return;
  }
  list.innerHTML = state.companies.map(c => `
    <div class="card" style="${state.active === c.id ? 'border:2px solid var(--accent)' : ''}">
      <div class="card-row">
        <div class="card-icon" style="background:var(--bg)">${ICONS[c.type] || '🏢'}</div>
        <div class="card-info">
          <div class="card-row" style="gap:6px">
            <div class="card-name">${c.name}</div>
            ${state.active === c.id ? '<div class="active-dot"></div>' : ''}
          </div>
          <div style="margin-top:4px;display:flex;gap:4px;flex-wrap:wrap">
            <span class="badge ${TAX_COLORS[c.tax] || 'badge-blue'}">${c.tax}</span>
            <span class="badge badge-yellow">${c.turnover}</span>
          </div>
        </div>
        <div class="card-actions">
          ${state.active !== c.id ? `<button class="btn btn-ghost btn-icon btn-sm" onclick="setActive('${c.id}')" title="Выбрать">✓</button>` : ''}
          <button class="btn btn-danger btn-icon btn-sm" onclick="deleteCompany('${c.id}')" title="Удалить">✕</button>
        </div>
      </div>
      ${state.active === c.id ? `<div style="margin-top:10px"><button class="btn btn-primary" onclick="askBot('${c.name}', '${c.tax}', '${c.turnover}')">💬 Задать вопрос по этой компании</button></div>` : ''}
    </div>
  `).join('');
}

async function setActive(id) {
  state.active = id;
  await fetch(`${API}/api/user/${userId}/active/${id}`, { method: 'POST' });
  renderCompanies();
}

async function deleteCompany(id) {
  tg.showConfirm('Удалить компанию?', async (ok) => {
    if (!ok) return;
    state.companies = state.companies.filter(c => c.id !== id);
    if (state.active === id) state.active = state.companies[0]?.id || null;
    await fetch(`${API}/api/user/${userId}/company/${id}`, { method: 'DELETE' });
    renderCompanies();
  });
}

function openAddModal() { document.getElementById('add-modal').classList.add('open'); }
function closeAddModal(e) {
  if (!e || e.target === document.getElementById('add-modal'))
    document.getElementById('add-modal').classList.remove('open');
}

async function saveCompany() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { tg.showAlert('Введите название'); return; }
  const company = {
    name, type: document.getElementById('f-type').value,
    tax: document.getElementById('f-tax').value,
    turnover: document.getElementById('f-turnover').value,
    inn: document.getElementById('f-inn').value,
  };
  const r = await fetch(`${API}/api/user/${userId}/company`, {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(company)
  });
  const data = await r.json();
  state.companies = data.companies;
  if (!state.active && state.companies.length) state.active = state.companies[0].id;
  document.getElementById('f-name').value = '';
  document.getElementById('f-inn').value = '';
  closeAddModal();
  renderCompanies();
}

function askBot(name, tax, turnover) {
  const text = `Активная компания: ${name}, ${tax}, оборот ${turnover}.`;
  tg.sendData(text);
  tg.close();
}

// ── Calculators ────────────────────────────────────────────────
function fmt(n) { return Math.round(n).toLocaleString('ru') + ' сум'; }

function showResult(id, rows) {
  const el = document.getElementById(id);
  el.innerHTML = rows.map((r, i) =>
    `<div class="calc-row"><span>${r[0]}</span><span class="calc-val">${r[1]}</span></div>`
  ).join('');
  el.classList.add('show');
}

function calcNDS() {
  const amount = parseFloat(document.getElementById('nds-amount').value);
  if (!amount) return;
  const type = document.getElementById('nds-type').value;
  if (type === 'on') {
    const nds = amount * 0.12, total = amount + nds;
    showResult('nds-result', [['Сумма без НДС', fmt(amount)], ['НДС 12%', fmt(nds)], ['Итого с НДС', fmt(total)]]);
  } else {
    const nds = amount * 12 / 112, base = amount - nds;
    showResult('nds-result', [['Сумма с НДС', fmt(amount)], ['НДС (12/112)', fmt(nds)], ['Без НДС', fmt(base)]]);
  }
}

function calcSalary() {
  const g = parseFloat(document.getElementById('sal-amount').value);
  if (!g) return;
  const ndfl = g * 0.12, net = g - ndfl, social = g * 0.12, total = g + social;
  showResult('sal-result', [
    ['Gross (начислено)', fmt(g)], ['НДФЛ 12% (удержан)', fmt(ndfl)], ['На руки (net)', fmt(net)],
    ['──────────────', ''], ['Соцналог 12%', fmt(social)], ['Итого расходов', fmt(total)]
  ]);
}

document.getElementById('tax-system').addEventListener('change', function() {
  document.getElementById('expenses-row').style.display = this.value === 'profit' ? 'block' : 'none';
});

function calcTax() {
  const rev = parseFloat(document.getElementById('tax-revenue').value);
  if (!rev) return;
  const sys = document.getElementById('tax-system').value;
  if (sys === 'usn') {
    const tax = rev * 0.04;
    showResult('tax-result', [['Выручка', fmt(rev)], ['Налог 4%', fmt(tax)], ['После налога', fmt(rev - tax)]]);
  } else {
    const exp = parseFloat(document.getElementById('tax-expenses').value) || 0;
    const profit = rev - exp, tax = Math.max(0, profit * 0.15);
    showResult('tax-result', [
      ['Выручка', fmt(rev)], ['Расходы', fmt(exp)], ['Прибыль', fmt(profit)],
      ['Налог 15%', fmt(tax)], ['Чистая прибыль', fmt(profit - tax)]
    ]);
  }
}

// ── Profile ────────────────────────────────────────────────────
function renderProfile() {
  const left = state.requests_left ?? 10;
  document.getElementById('requests-left').textContent = left;
  document.getElementById('progress-fill').style.width = (left / 10 * 100) + '%';
}

function setLang(lang) {
  state.lang = lang;
  document.getElementById('btn-ru').style.background = lang === 'ru' ? 'var(--accent)' : '';
  document.getElementById('btn-ru').style.color = lang === 'ru' ? 'white' : '';
  document.getElementById('btn-uz').style.background = lang === 'uz' ? 'var(--accent)' : '';
  document.getElementById('btn-uz').style.color = lang === 'uz' ? 'white' : '';
  tg.sendData(JSON.stringify({action: 'set_lang', lang}));
}

// ── Init ───────────────────────────────────────────────────────
loadUser();
</script>
</body>
</html>
