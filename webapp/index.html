<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Accountant Uzbekistan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   AI Accountant Uzbekistan — Design tokens & base
   Deep premium purple · indigo / royal-blue accents
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&display=swap');

:root {
  /* Brand */
  --violet-900: #2A1259;
  --violet-800: #3A1B73;
  --violet-700: #4C1D95;
  --violet-600: #5B21B6;
  --violet-500: #6D28D9;
  --violet-400: #7C3AED;
  --violet-300: #9061F0;
  --violet-100: #EDE6FB;
  --violet-50:  #F5F1FD;

  --accent: var(--violet-500);
  --accent-strong: var(--violet-700);
  --indigo: #4F46E5;
  --royal: #2563EB;

  /* Neutrals */
  --ink:      #1A1426;
  --ink-soft: #4A4458;
  --muted:    #847E92;
  --faint:    #ABA6B6;
  --line:     #ECE9F1;
  --line-soft:#F2F0F6;

  /* Surfaces */
  --bg:        #F6F5F9;
  --surface:   #FFFFFF;
  --sidebar:   #FCFBFE;
  --rail:      #FAF9FD;

  /* Status */
  --green:   #1F9D6B;
  --green-bg:#E4F6EE;
  --amber:   #C2820C;
  --amber-bg:#FBF1DC;
  --red:     #DC4A4A;
  --red-bg:  #FBE9E9;
  --blue-bg: #E8EEFE;

  /* Radius */
  --r-xs: 8px;
  --r-sm: 11px;
  --r-md: 14px;
  --r-lg: 18px;
  --r-xl: 22px;
  --r-pill: 999px;

  /* Shadow */
  --sh-xs: 0 1px 2px rgba(26,20,38,.05);
  --sh-sm: 0 1px 3px rgba(26,20,38,.06), 0 1px 2px rgba(26,20,38,.04);
  --sh-md: 0 4px 16px -4px rgba(26,20,38,.10), 0 2px 6px -2px rgba(26,20,38,.06);
  --sh-lg: 0 18px 48px -12px rgba(45,20,90,.18), 0 6px 16px -6px rgba(26,20,38,.08);
  --sh-glow: 0 10px 30px -8px rgba(109,40,217,.35);

  --font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea { font-family: inherit; }
::selection { background: var(--violet-100); color: var(--violet-700); }

::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: #DDD8E6; border-radius: 99px; border: 3px solid transparent; background-clip: content-box; }
::-webkit-scrollbar-thumb:hover { background: #C8C2D6; background-clip: content-box; }
::-webkit-scrollbar-track { background: transparent; }

/* ---- App shell ---- */
.app {
  display: grid;
  grid-template-columns: 268px 1fr;
  height: 100vh;
  overflow: hidden;
}

/* ============================================================
   SIDEBAR
   ============================================================ */
.sidebar {
  background: var(--sidebar);
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}
.sb-top { padding: 20px 16px 4px; }
.brand {
  display: flex; align-items: center; gap: 11px;
  padding: 6px 8px 4px;
}
.brand-mark {
  width: 38px; height: 38px; border-radius: 11px;
  background: linear-gradient(150deg, var(--violet-400), var(--violet-700) 70%);
  display: grid; place-items: center; color: #fff;
  box-shadow: var(--sh-glow);
  flex-shrink: 0;
}
.brand-name { font-size: 14.5px; font-weight: 800; letter-spacing: -.02em; line-height: 1.1; white-space: nowrap; }
.brand-sub { font-size: 11px; color: var(--muted); font-weight: 600; margin-top: 1px; letter-spacing: .01em; }

.sb-scroll { flex: 1; overflow-y: auto; padding: 8px 12px 12px; }
.nav-group { display: flex; flex-direction: column; gap: 2px; }
.nav-item {
  display: flex; align-items: center; gap: 11px;
  padding: 9px 11px; border-radius: var(--r-sm);
  font-size: 13.5px; font-weight: 600; color: var(--ink-soft);
  text-align: left; width: 100%;
  transition: background .14s, color .14s;
  position: relative;
}
.nav-item svg { color: var(--faint); transition: color .14s; flex-shrink: 0; }
.nav-item:hover { background: var(--line-soft); color: var(--ink); }
.nav-item:hover svg { color: var(--ink-soft); }
.nav-item.active { background: var(--violet-100); color: var(--violet-700); }
.nav-item.active svg { color: var(--violet-500); }
.nav-item .pill-count {
  margin-left: auto; font-size: 11px; font-weight: 700;
  background: var(--surface); color: var(--muted);
  padding: 1px 7px; border-radius: 99px; border: 1px solid var(--line);
}
.nav-item.primary {
  background: var(--ink); color: #fff; margin: 6px 0;
  box-shadow: var(--sh-sm);
}
.nav-item.primary svg { color: #fff; }
.nav-item.primary:hover { background: #2D2640; }

.sb-label {
  font-size: 10.5px; font-weight: 700; letter-spacing: .07em;
  text-transform: uppercase; color: var(--faint);
  padding: 0 11px; margin: 18px 0 7px;
  display: flex; align-items: center; justify-content: space-between;
}
.chat-item {
  display: flex; align-items: center; gap: 9px;
  padding: 7px 11px; border-radius: var(--r-sm);
  font-size: 12.5px; font-weight: 500; color: var(--ink-soft);
  width: 100%; text-align: left;
  transition: background .14s;
  white-space: nowrap; overflow: hidden;
}
.chat-item .dot { width: 5px; height: 5px; border-radius: 99px; background: var(--violet-300); flex-shrink: 0; }
.chat-item span { overflow: hidden; text-overflow: ellipsis; }
.chat-item:hover { background: var(--line-soft); color: var(--ink); }
.chat-item.active { background: var(--violet-50); color: var(--violet-700); }
.view-all {
  font-size: 12px; font-weight: 600; color: var(--violet-500);
  padding: 8px 11px; border-radius: var(--r-sm); width: 100%; text-align: left;
  display: flex; align-items: center; gap: 6px;
}
.view-all:hover { background: var(--violet-50); }

.sb-bottom { padding: 10px 12px; border-top: 1px solid var(--line); display: flex; flex-direction: column; gap: 2px; }

/* ============================================================
   HEADER
   ============================================================ */
.main { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
.header {
  height: 64px; flex-shrink: 0;
  display: flex; align-items: center; gap: 16px;
  padding: 0 22px;
  background: rgba(252,251,254,.82);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--line);
  z-index: 20;
}
.header-zone { flex: 1 1 0; display: flex; align-items: center; min-width: 0; }
.header-zone.left { justify-content: flex-start; }
.header-zone.center { flex: 0 1 368px; justify-content: center; }
.header-zone.right { justify-content: flex-end; }

/* ---- currency ticker ---- */
.fx {
  display: flex; align-items: center; gap: 1px;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--r-pill); padding: 4px 8px 4px 9px;
  box-shadow: var(--sh-xs); height: 40px; flex-shrink: 0; max-width: 100%;
}
.fx-label { display: flex; align-items: center; gap: 5px; padding-right: 6px; border-right: 1px solid var(--line-soft); margin-right: 1px; }
.fx-label svg { color: var(--violet-400); flex-shrink: 0; }
.fx-item { display: flex; align-items: center; gap: 4px; padding: 4px 5px; border-radius: var(--r-pill); white-space: nowrap; }
.fx-item:hover { background: var(--line-soft); }
.fx-ccy { font-size: 10.5px; font-weight: 800; color: var(--ink); letter-spacing: .01em; }
.fx-val { font-size: 11px; font-weight: 600; color: var(--ink-soft); font-variant-numeric: tabular-nums; white-space: nowrap; }
.fx-delta { display: inline-flex; align-items: center; font-size: 9px; font-weight: 700; white-space: nowrap; }
.fx-delta.up { color: var(--green); }
.fx-delta.down { color: var(--red); }
.fx-delta svg { width: 11px; height: 11px; }

.search {
  width: 100%; position: relative;
  display: flex; align-items: center; gap: 10px;
  height: 42px; padding: 0 14px;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--r-pill);
  box-shadow: var(--sh-xs);
  transition: border .15s, box-shadow .15s;
}
.search:focus-within { border-color: var(--violet-300); box-shadow: 0 0 0 4px var(--violet-50); }
.search input { flex: 1; border: none; outline: none; background: none; font-size: 13.5px; color: var(--ink); }
.search input::placeholder { color: var(--faint); }
.search .kbd {
  font-size: 11px; font-weight: 600; color: var(--muted);
  border: 1px solid var(--line); border-radius: 6px; padding: 2px 6px; background: var(--rail);
}
.header-spacer { flex: 1; }
.h-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; flex-shrink: 0; }
.icon-btn {
  width: 40px; height: 40px; border-radius: var(--r-sm);
  display: grid; place-items: center; color: var(--ink-soft);
  position: relative; transition: background .14s, color .14s;
}
.icon-btn:hover { background: var(--line-soft); color: var(--ink); }
.icon-btn .badge {
  position: absolute; top: 7px; right: 7px;
  min-width: 16px; height: 16px; padding: 0 4px;
  background: var(--red); color: #fff; font-size: 9.5px; font-weight: 700;
  border-radius: 99px; display: grid; place-items: center;
  border: 2px solid var(--sidebar);
}
.lang-btn {
  display: flex; align-items: center; gap: 7px;
  height: 40px; padding: 0 12px; border-radius: var(--r-sm);
  font-size: 12.5px; font-weight: 600; color: var(--ink-soft);
  transition: background .14s;
}
.lang-btn:hover { background: var(--line-soft); }
.profile-btn {
  display: flex; align-items: center; gap: 9px;
  height: 44px; padding: 3px 8px 3px 3px; border-radius: var(--r-pill);
  transition: background .14s; margin-left: 2px;
}
.profile-btn:hover { background: var(--line-soft); }
.avatar {
  width: 38px; height: 38px; border-radius: 99px; flex-shrink: 0;
  background: linear-gradient(140deg, var(--violet-400), var(--indigo));
  color: #fff; display: grid; place-items: center; font-weight: 700; font-size: 13px;
  box-shadow: var(--sh-xs);
}
.profile-meta { text-align: left; line-height: 1.15; white-space: nowrap; }
.profile-meta .pn { font-size: 12.5px; font-weight: 700; }
.profile-meta .pr { font-size: 11px; color: var(--muted); font-weight: 500; }

/* ---- dropdown ---- */
.menu {
  position: absolute; right: 0; top: calc(100% + 8px);
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--r-md); box-shadow: var(--sh-lg);
  min-width: 230px; padding: 6px; z-index: 60;
  animation: pop .14s ease;
}
@keyframes pop { from { opacity: 0; transform: translateY(-6px) scale(.98); } to { opacity: 1; transform: none; } }
.menu-head { padding: 11px 12px 10px; display: flex; align-items: center; gap: 11px; border-bottom: 1px solid var(--line-soft); margin-bottom: 5px; }
.menu-item {
  display: flex; align-items: center; gap: 11px;
  padding: 9px 11px; border-radius: var(--r-xs); width: 100%; text-align: left;
  font-size: 13px; font-weight: 600; color: var(--ink-soft);
}
.menu-item svg { color: var(--faint); }
.menu-item:hover { background: var(--line-soft); color: var(--ink); }
.menu-item.danger { color: var(--red); }
.menu-item.danger svg { color: var(--red); }
.menu-sep { height: 1px; background: var(--line-soft); margin: 5px 0; }
.lang-row { display: flex; align-items: center; justify-content: space-between; }
.lang-row .check { color: var(--violet-500); }

/* ============================================================
   CONTENT / VIEWS
   ============================================================ */
.content { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
.wrap { max-width: 1024px; margin: 0 auto; padding: 40px 40px 80px; }

/* fade for view switch (transform-only so DOM-capture stays visible) */
.view { animation: viewin .32s cubic-bezier(.22,.61,.36,1); }
@keyframes viewin { from { transform: translateY(10px); } to { transform: none; } }

/* ---- Hero ---- */
.hero { text-align: center; padding: 26px 0 24px; }
.hero-badge {
  display: inline-flex; align-items: center; gap: 7px;
  font-size: 12px; font-weight: 600; color: var(--violet-700);
  background: var(--violet-50); border: 1px solid var(--violet-100);
  padding: 5px 13px 5px 9px; border-radius: 99px; margin-bottom: 20px;
}
.hero-badge .ring { width: 7px; height: 7px; border-radius: 99px; background: var(--green); box-shadow: 0 0 0 3px var(--green-bg); }
.hero h1 {
  font-size: 38px; font-weight: 800; letter-spacing: -.035em; line-height: 1.08;
  margin: 0 0 14px;
}
.hero h1 .grad {
  background: linear-gradient(100deg, var(--violet-500), var(--indigo) 60%, var(--royal));
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
}
.hero p { font-size: 16px; color: var(--ink-soft); max-width: 560px; margin: 0 auto; line-height: 1.55; font-weight: 500; }

/* ---- Composer ---- */
.composer {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--r-xl); box-shadow: var(--sh-lg);
  padding: 6px; margin: 28px auto 0; max-width: 760px;
  transition: border .15s, box-shadow .15s;
}
.composer:focus-within { border-color: var(--violet-300); box-shadow: var(--sh-lg), 0 0 0 4px var(--violet-50); }
.composer-field {
  padding: 14px 16px 6px; width: 100%; border: none; outline: none; resize: none;
  font-size: 15px; line-height: 1.5; color: var(--ink); background: none;
  min-height: 56px; max-height: 200px;
}
.composer-field::placeholder { color: var(--faint); }
.composer-bar { display: flex; align-items: center; gap: 4px; padding: 6px 8px 8px; }
.tool-btn {
  display: flex; align-items: center; gap: 7px;
  height: 36px; padding: 0 11px; border-radius: var(--r-sm);
  font-size: 12.5px; font-weight: 600; color: var(--ink-soft);
  transition: background .14s, color .14s;
}
.tool-btn svg { color: var(--muted); }
.tool-btn:hover { background: var(--line-soft); color: var(--ink); }
.tool-btn:hover svg { color: var(--ink-soft); }
.tool-icon { width: 36px; height: 36px; border-radius: var(--r-sm); display: grid; place-items: center; color: var(--muted); transition: background .14s, color .14s; }
.tool-icon:hover { background: var(--line-soft); color: var(--ink); }
.send-btn {
  width: 40px; height: 40px; border-radius: var(--r-md); margin-left: auto;
  background: linear-gradient(150deg, var(--violet-400), var(--violet-700));
  color: #fff; display: grid; place-items: center;
  box-shadow: var(--sh-glow); transition: transform .12s, opacity .15s;
}
.send-btn:hover { transform: translateY(-1px); }
.send-btn:disabled { opacity: .4; box-shadow: none; cursor: default; transform: none; }

/* attach menu */
.attach-menu {
  position: absolute; bottom: calc(100% + 8px); left: 0;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--r-md); box-shadow: var(--sh-lg); padding: 6px; min-width: 210px; z-index: 40;
  animation: pop .14s ease;
}

/* ---- Suggested quick actions ---- */
.suggestions { display: flex; flex-wrap: wrap; gap: 9px; justify-content: center; max-width: 720px; margin: 20px auto 0; }
.chip {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 14px; border-radius: var(--r-pill);
  background: var(--surface); border: 1px solid var(--line);
  font-size: 12.5px; font-weight: 600; color: var(--ink-soft);
  box-shadow: var(--sh-xs); transition: border .14s, color .14s, transform .12s, box-shadow .14s;
}
.chip svg { color: var(--violet-400); }
.chip:hover { border-color: var(--violet-300); color: var(--violet-700); transform: translateY(-1px); box-shadow: var(--sh-sm); }

/* ---- Section heading ---- */
.sec-head { display: flex; align-items: baseline; justify-content: space-between; margin: 0 0 16px; }
.sec-title { font-size: 16px; font-weight: 700; letter-spacing: -.02em; }
.sec-title .sub { font-size: 12.5px; font-weight: 500; color: var(--muted); margin-top: 2px; }
.sec-link { font-size: 12.5px; font-weight: 600; color: var(--violet-500); display: flex; align-items: center; gap: 5px; }
.sec-link:hover { gap: 8px; }
.block { margin-top: 46px; }

/* ---- Quick access cards ---- */
.qa-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.qa-card {
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg);
  padding: 18px; text-align: left; box-shadow: var(--sh-xs);
  transition: border .15s, box-shadow .15s, transform .12s;
  display: flex; flex-direction: column; gap: 12px;
}
.qa-card:hover { border-color: var(--violet-200, #DDD0F5); box-shadow: var(--sh-md); transform: translateY(-2px); }
.qa-ic {
  width: 42px; height: 42px; border-radius: 12px; display: grid; place-items: center;
}
.qa-card h4 { font-size: 14px; font-weight: 700; margin: 0; letter-spacing: -.01em; }
.qa-card p { font-size: 12.5px; color: var(--muted); margin: 3px 0 0; line-height: 1.45; font-weight: 500; }
.qa-foot { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: var(--violet-500); margin-top: auto; }

/* tints */
.tint-violet { background: var(--violet-50); color: var(--violet-600); }
.tint-indigo { background: #ECEBFC; color: var(--indigo); }
.tint-blue   { background: var(--blue-bg); color: var(--royal); }
.tint-green  { background: var(--green-bg); color: var(--green); }
.tint-amber  { background: var(--amber-bg); color: var(--amber); }
.tint-rose   { background: #FCE9F3; color: #C13D8B; }

/* ---- Companies ---- */
.co-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.co-card {
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg);
  padding: 18px; box-shadow: var(--sh-xs); transition: border .15s, box-shadow .15s, transform .12s;
  display: flex; flex-direction: column;
}
.co-card:hover { border-color: #DDD0F5; box-shadow: var(--sh-md); transform: translateY(-2px); }
.co-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px; }
.co-logo {
  width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
  display: grid; place-items: center; font-weight: 800; font-size: 16px; color: #fff;
}
.co-name { font-size: 14px; font-weight: 700; letter-spacing: -.01em; line-height: 1.2; }
.co-tin { font-size: 11.5px; color: var(--muted); font-weight: 600; margin-top: 3px; font-variant-numeric: tabular-nums; }
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 99px;
}
.badge .bd { width: 6px; height: 6px; border-radius: 99px; }
.badge.ok { background: var(--green-bg); color: var(--green); }
.badge.ok .bd { background: var(--green); }
.badge.due { background: var(--amber-bg); color: var(--amber); }
.badge.due .bd { background: var(--amber); }
.co-meta { display: flex; align-items: center; justify-content: space-between; padding: 13px 0; border-top: 1px solid var(--line-soft); margin-top: auto; }
.co-meta .lbl { font-size: 11px; color: var(--faint); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
.co-meta .val { font-size: 12.5px; color: var(--ink-soft); font-weight: 600; margin-top: 3px; }
.co-btn {
  display: flex; align-items: center; justify-content: center; gap: 7px;
  height: 38px; border-radius: var(--r-sm); width: 100%;
  background: var(--violet-50); color: var(--violet-700); font-size: 12.5px; font-weight: 700;
  transition: background .14s;
}
.co-btn:hover { background: var(--violet-100); }

/* ---- two-col layout (companies + calendar) ---- */
.split { display: grid; grid-template-columns: 1fr 320px; gap: 24px; align-items: start; }

/* ---- Tax calendar widget ---- */
.cal {
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg);
  box-shadow: var(--sh-sm); overflow: hidden; position: sticky; top: 0;
}
.cal-head {
  padding: 16px 18px; display: flex; align-items: center; justify-content: space-between;
  background: linear-gradient(160deg, var(--violet-700), var(--violet-500));
  color: #fff;
}
.cal-head h4 { font-size: 13.5px; font-weight: 700; margin: 0; }
.cal-head .mo { font-size: 11.5px; opacity: .85; font-weight: 600; margin-top: 2px; }
.cal-list { padding: 8px; }
.cal-item { display: flex; align-items: center; gap: 13px; padding: 11px 11px; border-radius: var(--r-sm); transition: background .14s; }
.cal-item:hover { background: var(--line-soft); }
.cal-date {
  width: 44px; height: 46px; border-radius: 11px; flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  border: 1px solid var(--line);
}
.cal-date .d { font-size: 16px; font-weight: 800; line-height: 1; letter-spacing: -.02em; }
.cal-date .m { font-size: 9.5px; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-top: 2px; letter-spacing: .05em; }
.cal-date.urgent { background: var(--red-bg); border-color: transparent; }
.cal-date.urgent .d { color: var(--red); }
.cal-info { flex: 1; min-width: 0; }
.cal-info .t { font-size: 13px; font-weight: 700; letter-spacing: -.01em; }
.cal-info .s { font-size: 11.5px; color: var(--muted); font-weight: 500; margin-top: 2px; }
.cal-foot { padding: 12px 14px; border-top: 1px solid var(--line-soft); }
.cal-foot button { width: 100%; height: 38px; border-radius: var(--r-sm); font-size: 12.5px; font-weight: 700; color: var(--violet-700); background: var(--violet-50); }
.cal-foot button:hover { background: var(--violet-100); }

/* ============================================================
   CONVERSATION VIEW
   ============================================================ */
.chat-wrap { max-width: 800px; margin: 0 auto; padding: 32px 40px 24px; }
.msg { display: flex; gap: 14px; margin-bottom: 30px; animation: viewin .3s ease; }
.msg-av { width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0; display: grid; place-items: center; font-weight: 700; font-size: 12px; }
.msg-av.user { background: linear-gradient(140deg, var(--violet-400), var(--indigo)); color: #fff; }
.msg-av.ai { background: linear-gradient(150deg, var(--violet-500), var(--violet-800)); color: #fff; box-shadow: var(--sh-glow); }
.msg-body { flex: 1; min-width: 0; padding-top: 4px; }
.msg-name { font-size: 12.5px; font-weight: 700; margin-bottom: 6px; color: var(--ink); }
.msg-text { font-size: 14.5px; line-height: 1.65; color: var(--ink-soft); }
.msg-text p { margin: 0 0 12px; }
.msg-text strong { color: var(--ink); font-weight: 700; }
.msg-text ul { margin: 0 0 12px; padding-left: 18px; }
.msg-text li { margin-bottom: 6px; }
.msg-text .cite {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11.5px; font-weight: 600; color: var(--violet-600);
  background: var(--violet-50); border: 1px solid var(--violet-100);
  padding: 2px 8px; border-radius: 99px; margin: 0 2px; vertical-align: middle;
}
.ai-callout {
  background: var(--violet-50); border: 1px solid var(--violet-100); border-radius: var(--r-md);
  padding: 14px 16px; margin: 4px 0 14px; display: flex; gap: 12px;
}
.ai-callout .co-ic { color: var(--violet-500); flex-shrink: 0; margin-top: 1px; }
.ai-callout .t { font-size: 13px; line-height: 1.5; color: var(--ink-soft); }
.ai-callout .t b { color: var(--violet-700); }
.msg-actions { display: flex; gap: 4px; margin-top: 14px; }
.msg-actions button { width: 32px; height: 32px; border-radius: 8px; display: grid; place-items: center; color: var(--faint); transition: background .14s, color .14s; }
.msg-actions button:hover { background: var(--line-soft); color: var(--ink-soft); }

.typing { display: flex; gap: 4px; padding-top: 8px; }
.typing span { width: 7px; height: 7px; border-radius: 99px; background: var(--violet-300); animation: bounce 1.2s infinite ease; }
.typing span:nth-child(2) { animation-delay: .15s; }
.typing span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: .5; } 30% { transform: translateY(-5px); opacity: 1; } }

.chat-footer { padding: 12px 40px 22px; background: linear-gradient(transparent, var(--bg) 30%); }
.chat-footer .composer { margin-top: 0; }
.chat-disclaimer { text-align: center; font-size: 11px; color: var(--faint); margin-top: 10px; font-weight: 500; }

/* ============================================================
   GENERIC PLACEHOLDER VIEW
   ============================================================ */
.ph { text-align: center; padding: 90px 20px; max-width: 460px; margin: 0 auto; }
.ph-ic { width: 64px; height: 64px; border-radius: 18px; margin: 0 auto 22px; display: grid; place-items: center; background: var(--violet-50); color: var(--violet-500); box-shadow: var(--sh-sm); }
.ph h2 { font-size: 22px; font-weight: 800; letter-spacing: -.02em; margin: 0 0 10px; }
.ph p { font-size: 14px; color: var(--muted); line-height: 1.6; font-weight: 500; margin: 0 0 22px; }
.ph button { height: 42px; padding: 0 22px; border-radius: var(--r-md); background: var(--ink); color: #fff; font-size: 13px; font-weight: 700; box-shadow: var(--sh-sm); }
.ph button:hover { background: #2D2640; }

/* page header for sub-views */
.page-head { margin-bottom: 28px; }
.page-head h1 { font-size: 27px; font-weight: 800; letter-spacing: -.03em; margin: 0 0 7px; }
.page-head p { font-size: 14.5px; color: var(--muted); font-weight: 500; margin: 0; }

/* stat row */
.stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 34px; }
.stat {
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg);
  padding: 16px 18px; box-shadow: var(--sh-xs);
}
.stat .sl { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; color: var(--muted); }
.stat .sl svg { color: var(--violet-400); }
.stat .sv { font-size: 27px; font-weight: 800; letter-spacing: -.03em; margin-top: 10px; font-variant-numeric: tabular-nums; }
.stat .sd { font-size: 11.5px; font-weight: 600; margin-top: 4px; display: flex; align-items: center; gap: 4px; }
.stat .sd.up { color: var(--green); }

.fade-overlay { position: fixed; inset: 0; z-index: 50; }

/* ============================================================
   CALENDAR VIEW
   ============================================================ */
.cal-page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; margin-bottom: 18px; }
.cal-page-head h1 { font-size: 27px; font-weight: 800; letter-spacing: -.03em; margin: 0 0 7px; }
.cal-page-head p { font-size: 14px; color: var(--muted); font-weight: 500; margin: 0; }
.cal-toolbar { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.cal-today-btn { height: 40px; padding: 0 16px; border-radius: var(--r-sm); border: 1px solid var(--line); background: var(--surface); font-size: 13px; font-weight: 700; color: var(--ink-soft); box-shadow: var(--sh-xs); }
.cal-today-btn:hover { background: var(--line-soft); }
.cal-month-nav { display: flex; align-items: center; gap: 4px; }
.cal-month-nav span { font-size: 14px; font-weight: 800; letter-spacing: -.02em; min-width: 124px; text-align: center; }
.cal-month-nav button { width: 34px; height: 34px; border-radius: var(--r-sm); display: grid; place-items: center; color: var(--ink-soft); }
.cal-month-nav button:hover { background: var(--line-soft); }
.cal-new-btn { height: 40px; padding: 0 16px; border-radius: var(--r-sm); background: var(--ink); color: #fff; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 7px; box-shadow: var(--sh-sm); }
.cal-new-btn:hover { background: #2D2640; }

.cal-legend { display: flex; align-items: center; gap: 18px; margin-bottom: 16px; }
.cal-legend .leg { display: flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 600; color: var(--muted); }
.leg-dot { width: 9px; height: 9px; border-radius: 3px; }
.leg-dot.ev-filing { background: var(--violet-500); }
.leg-dot.ev-meeting { background: var(--royal); }
.leg-dot.ev-note { background: var(--amber); }

.cal-layout { display: grid; grid-template-columns: 1fr 332px; gap: 22px; align-items: start; }

.cal-grid-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); box-shadow: var(--sh-sm); overflow: hidden; }
.cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); border-bottom: 1px solid var(--line); }
.cal-wd { padding: 12px 14px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--faint); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
.cal-cell {
  min-height: 104px; border-right: 1px solid var(--line-soft); border-bottom: 1px solid var(--line-soft);
  padding: 8px 8px 6px; text-align: left; display: flex; flex-direction: column; gap: 5px;
  transition: background .12s; position: relative; align-items: stretch;
}
.cal-cell:nth-child(7n) { border-right: none; }
.cal-cell.empty { background: #FBFAFD; }
.cal-cell:not(.empty):hover { background: var(--violet-50); }
.cal-cell.selected { background: var(--violet-50); box-shadow: inset 0 0 0 2px var(--violet-400); }
.cal-daynum { font-size: 13px; font-weight: 700; color: var(--ink-soft); width: 26px; height: 26px; display: grid; place-items: center; border-radius: 99px; }
.cal-cell.today .cal-daynum { background: var(--violet-500); color: #fff; box-shadow: var(--sh-glow); }
.cal-cell-evs { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.cal-ev {
  font-size: 10.5px; font-weight: 600; padding: 2px 6px; border-radius: 5px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.35;
}
.cal-ev b { font-weight: 800; margin-right: 4px; }
.cal-ev.ev-filing { background: var(--violet-100); color: var(--violet-700); }
.cal-ev.ev-meeting { background: var(--blue-bg); color: var(--royal); }
.cal-ev.ev-note { background: var(--amber-bg); color: var(--amber); }

/* side panels */
.cal-side { display: flex; flex-direction: column; gap: 16px; }
.cal-panel { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); box-shadow: var(--sh-sm); overflow: hidden; }
.cal-panel-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 12px; border-bottom: 1px solid var(--line-soft); }
.cal-panel-title { font-size: 13.5px; font-weight: 800; letter-spacing: -.01em; }
.cal-panel-date { font-size: 12px; font-weight: 700; color: var(--violet-500); }
.cal-pill { font-size: 11px; font-weight: 700; background: var(--violet-50); color: var(--violet-600); padding: 2px 9px; border-radius: 99px; }
.cal-panel-body { padding: 8px; display: flex; flex-direction: column; gap: 2px; }
.cal-empty { padding: 18px; text-align: center; color: var(--faint); font-size: 18px; }

.agenda-item { display: flex; align-items: center; gap: 11px; padding: 10px 10px; border-radius: var(--r-sm); width: 100%; text-align: left; transition: background .12s; }
button.agenda-item:hover { background: var(--line-soft); }
.agenda-ic { width: 30px; height: 30px; border-radius: 9px; display: grid; place-items: center; flex-shrink: 0; }
.agenda-ic.ev-filing { background: var(--violet-100); color: var(--violet-600); }
.agenda-ic.ev-meeting { background: var(--blue-bg); color: var(--royal); }
.agenda-ic.ev-note { background: var(--amber-bg); color: var(--amber); }
.agenda-t { display: block; font-size: 12.5px; font-weight: 700; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.agenda-s { display: block; font-size: 11px; font-weight: 500; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.agenda-time { font-size: 11px; font-weight: 700; color: var(--ink-soft); flex-shrink: 0; white-space: nowrap; }
.meet-date { width: 34px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; }
.meet-date b { font-size: 15px; font-weight: 800; line-height: 1; color: var(--ink); letter-spacing: -.02em; }
.meet-date span { font-size: 9px; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-top: 2px; letter-spacing: .05em; }

.note-add { display: flex; gap: 6px; padding: 4px 4px 8px; }
.note-add input { flex: 1; height: 36px; border: 1px solid var(--line); border-radius: var(--r-sm); padding: 0 11px; font-size: 12.5px; outline: none; background: var(--rail); }
.note-add input:focus { border-color: var(--violet-300); background: #fff; }
.note-add button { width: 36px; height: 36px; border-radius: var(--r-sm); background: var(--violet-500); color: #fff; display: grid; place-items: center; flex-shrink: 0; }
.note-add button:hover { background: var(--violet-600); }
.note-chip { display: flex; align-items: flex-start; gap: 10px; padding: 10px 11px; border-radius: var(--r-sm); font-size: 12.5px; font-weight: 600; color: var(--ink-soft); line-height: 1.4; margin: 2px 0; }
.note-chip .note-bar { width: 3px; align-self: stretch; border-radius: 99px; flex-shrink: 0; }
.note-chip.tint-violet { background: var(--violet-50); } .note-chip.tint-violet .note-bar { background: var(--violet-400); }
.note-chip.tint-blue { background: var(--blue-bg); } .note-chip.tint-blue .note-bar { background: var(--royal); }
.note-chip.tint-amber { background: var(--amber-bg); } .note-chip.tint-amber .note-bar { background: var(--amber); }
.note-chip.tint-green { background: var(--green-bg); } .note-chip.tint-green .note-bar { background: var(--green); }

/* ============================================================
   LEARNING CENTER
   ============================================================ */
.learn-featured {
  display: grid; grid-template-columns: 1fr 260px; gap: 0; margin-bottom: 30px;
  border-radius: var(--r-xl); overflow: hidden; box-shadow: var(--sh-lg);
  background: linear-gradient(135deg, var(--violet-700), var(--violet-500) 65%, var(--indigo));
}
.lf-left { padding: 28px 30px; color: #fff; }
.lf-tag { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; font-weight: 700; background: rgba(255,255,255,.16); padding: 5px 12px 5px 10px; border-radius: 99px; backdrop-filter: blur(4px); }
.lf-left h3 { font-size: 24px; font-weight: 800; letter-spacing: -.025em; margin: 16px 0 8px; line-height: 1.15; }
.lf-left p { font-size: 14px; font-weight: 500; opacity: .9; margin: 0 0 18px; line-height: 1.5; max-width: 460px; }
.lf-meta { display: flex; gap: 18px; margin-bottom: 18px; }
.lf-meta span { display: flex; align-items: center; gap: 6px; font-size: 12.5px; font-weight: 600; opacity: .92; }
.lf-prog { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; max-width: 420px; }
.lf-bar { flex: 1; height: 7px; border-radius: 99px; background: rgba(255,255,255,.22); overflow: hidden; }
.lf-bar span { display: block; height: 100%; border-radius: 99px; background: #fff; }
.lf-pct { font-size: 12px; font-weight: 700; white-space: nowrap; }
.lf-btn { display: inline-flex; align-items: center; gap: 8px; height: 42px; padding: 0 22px; border-radius: var(--r-md); background: #fff; color: var(--violet-700); font-size: 13.5px; font-weight: 700; box-shadow: var(--sh-sm); transition: transform .12s; }
.lf-btn:hover { transform: translateY(-1px); }
.lf-art { position: relative; display: grid; place-items: center; overflow: hidden; }
.lf-art::before, .lf-art::after { content: ''; position: absolute; border-radius: 99px; border: 1.5px solid rgba(255,255,255,.18); }
.lf-art::before { width: 230px; height: 230px; }
.lf-art::after { width: 150px; height: 150px; }
.lf-art-ic { position: relative; width: 88px; height: 88px; border-radius: 26px; background: rgba(255,255,255,.18); display: grid; place-items: center; color: #fff; backdrop-filter: blur(6px); box-shadow: 0 10px 30px -8px rgba(0,0,0,.3); }

.learn-tabs { display: flex; gap: 6px; margin-bottom: 18px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-pill); padding: 4px; width: fit-content; box-shadow: var(--sh-xs); }
.learn-tab { height: 34px; padding: 0 16px; border-radius: var(--r-pill); font-size: 12.5px; font-weight: 600; color: var(--ink-soft); transition: background .14s, color .14s; }
.learn-tab:hover { color: var(--ink); }
.learn-tab.active { background: var(--violet-500); color: #fff; box-shadow: var(--sh-xs); }

.learn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.course-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 18px; box-shadow: var(--sh-xs); transition: border .15s, box-shadow .15s, transform .12s; display: flex; flex-direction: column; }
.course-card:hover { border-color: #DDD0F5; box-shadow: var(--sh-md); transform: translateY(-2px); }
.course-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
.course-lvl { font-size: 10.5px; font-weight: 700; padding: 3px 9px; border-radius: 99px; }
.course-lvl.lvl-beginner { background: var(--green-bg); color: var(--green); }
.course-lvl.lvl-intermediate { background: var(--blue-bg); color: var(--royal); }
.course-lvl.lvl-advanced { background: var(--violet-100); color: var(--violet-700); }
.course-done { display: inline-flex; align-items: center; gap: 4px; font-size: 10.5px; font-weight: 700; padding: 3px 9px; border-radius: 99px; background: var(--green-bg); color: var(--green); }
.course-card h4 { font-size: 14.5px; font-weight: 700; letter-spacing: -.01em; margin: 0 0 6px; line-height: 1.25; }
.course-card p { font-size: 12.5px; color: var(--muted); font-weight: 500; line-height: 1.45; margin: 0 0 14px; }
.course-meta { display: flex; gap: 14px; margin-bottom: 14px; margin-top: auto; }
.course-meta span { display: flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 600; color: var(--ink-soft); }
.course-meta svg { color: var(--violet-400); }
.course-bar { height: 5px; border-radius: 99px; background: var(--line-soft); overflow: hidden; margin-bottom: 14px; }
.course-bar span { display: block; height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--violet-500), var(--indigo)); }
.course-btn { display: flex; align-items: center; justify-content: center; gap: 7px; height: 38px; border-radius: var(--r-sm); width: 100%; background: var(--violet-50); color: var(--violet-700); font-size: 12.5px; font-weight: 700; transition: background .14s; }
.course-btn:hover { background: var(--violet-100); }
.course-btn.ghost { background: var(--line-soft); color: var(--ink-soft); }
.course-btn.ghost:hover { background: #E9E6F0; }

/* ============================================================
   MOBILE — адаптив для телефона (≤ 768px)
   ============================================================ */

/* Overlay для закрытия drawer */
.sb-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 89;
  background: rgba(26,20,38,.45);
  backdrop-filter: blur(2px);
  animation: fadeIn .2s ease;
}
@keyframes fadeIn { from { opacity:0 } to { opacity:1 } }

/* Bottom Tab Bar */
.mob-tabbar {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 80;
  height: 62px;
  background: rgba(252,251,254,.96);
  backdrop-filter: blur(16px);
  border-top: 1px solid var(--line);
  padding: 0 4px env(safe-area-inset-bottom, 4px);
  box-shadow: 0 -4px 20px rgba(26,20,38,.07);
}
.mob-tabbar-inner {
  display: flex; align-items: stretch;
  height: 100%; gap: 2px;
}
.mob-tab {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 3px;
  border-radius: 12px; padding: 6px 4px;
  color: var(--muted); transition: color .15s, background .15s;
  font-size: 10px; font-weight: 600; letter-spacing: .01em;
  -webkit-tap-highlight-color: transparent;
}
.mob-tab svg { color: inherit; }
.mob-tab.active { color: var(--violet-600); background: var(--violet-50); }
.mob-tab.primary {
  color: #fff; background: var(--violet-600);
  box-shadow: 0 4px 14px rgba(109,40,217,.35);
  border-radius: 14px; margin: 6px 2px;
}

/* Hamburger кнопка в хедере (только мобиль) */
.mob-burger {
  display: none;
  width: 40px; height: 40px; border-radius: var(--r-sm);
  align-items: center; justify-content: center;
  color: var(--ink-soft); flex-shrink: 0;
  transition: background .14s;
}
.mob-burger:active { background: var(--line-soft); }

@media (max-width: 768px) {

  /* ── App shell ── */
  .app {
    grid-template-columns: 1fr;
    grid-template-rows: 1fr;
  }

  /* ── Sidebar становится drawer ── */
  .sidebar {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: min(300px, 82vw);
    z-index: 90;
    transform: translateX(-110%);
    transition: transform .28s cubic-bezier(.4,0,.2,1);
    box-shadow: none;
  }
  .sidebar.mob-open {
    transform: translateX(0);
    box-shadow: var(--sh-lg);
  }
  .sb-overlay { display: block; }

  /* ── Header ── */
  .header { height: 56px; padding: 0 12px; gap: 8px; }
  .mob-burger { display: flex; }
  .header-zone.left .fx { display: none; }   /* курсы скрываем */
  .header-zone.center { flex: 1 1 auto; }
  .search { height: 38px; padding: 0 12px; }
  .search .kbd { display: none; }
  .profile-meta { display: none; }           /* имя скрываем */
  .lang-btn span:first-child { display: none; } /* иконка глобуса */

  /* ── Main ── */
  .main { height: 100vh; }

  /* ── Content / views ── */
  .content { padding-bottom: 70px; }         /* место для tabbar */
  .wrap { padding-left: 16px; padding-right: 16px; }
  .page-head h1 { font-size: 21px; }
  .stat-row { grid-template-columns: repeat(2,1fr); gap: 10px; }
  .stat .sv { font-size: 22px; }
  .co-grid { grid-template-columns: 1fr !important; }

  /* ── Chat ── */
  .chat-wrap { padding: 16px 14px 16px; }
  .chat-footer { padding: 8px 12px calc(70px + env(safe-area-inset-bottom, 8px)); }
  .msg-text { font-size: 14px; }
  .chat-disclaimer { display: none; }

  /* ── Composer (поле ввода) ── */
  .composer { border-radius: 16px; }
  .composer textarea { font-size: 15px; }

  /* ── Bottom tabbar ── */
  .mob-tabbar { display: flex; }

  /* ── Dashboard qa-grid ── */
  .qa-grid { grid-template-columns: 1fr 1fr !important; gap: 10px !important; }
  .qa-item { padding: 12px !important; }

  { ccy: 'RUB', val: '142.6',  d: '-0.2%', dir: 'down' },
];

  useEffect(() => {
    async function loadRates() {
      try {
        const res = await fetch(API_BASE + '/api/rates');
        if (!res.ok) return;
        const data = await res.json();
        const order = ['USD','EUR','CNY','RUB'];
        const mapped = data
          .filter(r => order.includes(r.code))
          .sort((a,b) => order.indexOf(a.code) - order.indexOf(b.code))
          .map(r => {
            const diff = parseFloat(r.diff || 0);
            const rate = parseFloat(r.rate);
            const val = rate >= 1000
              ? Math.round(rate).toLocaleString('ru-RU')
              : rate.toFixed(1);
            return { ccy: r.code, val, d: (diff >= 0 ? '+' : '') + diff.toFixed(1) + '%', dir: diff >= 0 ? 'up' : 'down' };
          });
        if (mapped.length) setFx(mapped);
      } catch(e) { /* фоллбэк уже установлен */ }
    }
    loadRates();
    const timer = setInterval(loadRates, 300000); // каждые 5 мин

function CalendarView({ currentUser }) {
  const now = new Date();
  const YEAR = now.getFullYear(), MONTH = now.getMonth();
  const TODAY = now.getDate();
  const [sel, setSel] = useState(TODAY);
  const [notes, setNotes] = useState([]);
  const [noteDraft, setNoteDraft] = useState('');
  const [apiDeadlines, setApiDeadlines] = useState([]);

  // Загрузка реальных дедлайнов и событий из API
  useEffect(() => {
    if (!currentUser) return;
    async function loadData() {
      try {
        const [dlRes, evRes] = await Promise.all([
          fetch(`${API_BASE}/api/calendar/deadlines?days=60`, { headers: AUTH.authHeaders() }),
          fetch(`${API_BASE}/api/calendar/events`, { headers: AUTH.authHeaders() }),
        ]);
        if (dlRes.ok) {
          const dl = await dlRes.json();
          // Конвертируем дедлайны в формат CAL_EVENTS
          const dlEvents = (dl.deadlines || dl || []).map(d => {
            const date = new Date(d.date || d.deadline_date);
            return {
              d: date.getDate(),
              type: 'filing',
              time: null,
              title: { RU: d.title || d.name, EN: d.title || d.name, UZ: d.title || d.name },
              who:  { RU: d.description || '', EN: d.description || '', UZ: d.description || '' },
            };
          });
          setApiDeadlines(dlEvents);
        }
        if (evRes.ok) {
          const ev = await evRes.json();
          const userNotes = (ev.events || []).map(e => ({
            c: { RU: e.title, EN: e.title, UZ: e.title }, tint: 'tint-violet'
          }));
          if (userNotes.length) setNotes(userNotes);
        }
      } catch(_) {}
    }
    loadData();
  }, [currentUser]);

  const first = new Date(YEAR, MONTH, 1);
  const startDow = (first.getDay() + 6) % 7;       // Monday = 0
  const daysInMonth = new Date(YEAR, MONTH + 1, 0).getDate();

  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  // Объединяем статические + API дедлайны
  const allEvents = [...CAL_EVENTS, ...apiDeadlines];
  const evFor = (d) => allEvents.filter(e => e.d === d);
  const selEvents = evFor(sel);
  const meetings = allEvents.filter(e => e.type === 'meeting');

  const addNote = () => {
    const v = noteDraft.trim();
    if (!v) return;
    setNotes(n => [{ c: { EN: v, RU: v, UZ: v }, tint: 'tint-green' }, ...n]);
    setNoteDraft('');

                <button key={i}
                  className={'cal-cell' + (d === sel ? ' selected' : '') + (d === TODAY ? ' today' : '')}
                  onClick={() => setSel(d)}>
                  <span className="cal-daynum">{d}</span>
                  <span className="cal-cell-evs">
                    {evs.slice(0, 3).map((e, j) => (
                      <span key={j} className={'cal-ev ' + 'ev-' + e.type}>
                        {e.time && <b>{e.time}</b>}{tx(e.title)}

                    ))}

              );
            })}
          </div>
        </div>

        {/* Side panels */}
        <div className="cal-side">
          {/* Agenda for selected day */}
          <div className="cal-panel">
            <div className="cal-panel-head">
              <span className="cal-panel-title">{t('cal_agenda')}</span>
              <span className="cal-panel-date">{sel} {monthName}</span>

          <div className="cal-panel">
            <div className="cal-panel-head">
              <span className="cal-panel-title">{t('cal_standups')}</span>
              <span className="cal-pill">{meetings.length}</span>

            <div className="cal-panel-body">
              {meetings.map((e, i) => (
                <button key={i} className="agenda-item" onClick={() => setSel(e.d)}>
                  <span className="meet-date">

                  <span style={{ flex: 1, minWidth: 0 }}>
                    <span className="agenda-t">{tx(e.title)}</span>

            </div>

          {/* Notes */}
          <div className="cal-panel">
            <div className="cal-panel-head">
              <span className="cal-panel-title">{t('cal_notes_panel')}</span>
            </div>
            <div className="cal-panel-body">
              <div className="note-add">
                <input value={noteDraft} onChange={e => setNoteDraft(e.target.value)}

                <button onClick={addNote}><Icon n="plus" s={16} /></button>

                  <span>{tx(n.c)}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div></div>
  );
}

<script type="text/babel">

/* ---------- ChatView — рендерит и структурированные и текстовые ответы ---------- */
function ChatView({ messages, draft, setDraft, onSend, typing }) {
  const endRef = useRef(null);
  useEffect(() => { if (endRef.current) endRef.current.scrollTop = endRef.current.scrollHeight; }, [messages, typing]);

  function renderAiContent(m) {
    if (m.data) {
      // Структурированный формат (локальные моки из истории)
      return (
        <>
          <p>{m.data.intro}</p>
          <ul>{m.data.points.map((p, j) => <li key={j} dangerouslySetInnerHTML={{ __html: p }} />)}</ul>
          <p style={{ marginBottom: 8 }}>
            <span className="cite"><Icon n="scale" s={12} /> {m.data.cite}</span>
          </p>
          <div className="ai-callout">
            <span className="co-ic"><Icon n="sparkle" s={18} /></span>
            <span className="t" dangerouslySetInnerHTML={{ __html: m.data.callout }} />
          </div>
        </>
      );
    }
    // Текстовый формат — реальный ответ из API
    const lines = (m.text || '').split('\n');
    return lines.map((line, i) => {
      if (!line.trim()) return <br key={i} />;
      // Базовый markdown
      const html = line
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/`(.*?)`/g, '<code style="background:var(--violet-50);padding:1px 5px;border-radius:4px;font-size:13px;color:var(--violet-700)">$1</code>');
      if (line.startsWith('• ') || line.startsWith('- ')) {
        return <li key={i} dangerouslySetInnerHTML={{ __html: html.replace(/^[•\-] /, '') }} />;
      }
      return <p key={i} dangerouslySetInnerHTML={{ __html: html }} />;
    });
  }

  return (
    <div className="view" style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
      <div className="content" ref={endRef} style={{ flex: 1 }}>
        <div className="chat-wrap">
          {messages.map((m, i) => m.role === 'user' ? (
            <div className="msg" key={i}>
              <div className="msg-av user">DR</div>
              <div className="msg-body">
                <div className="msg-name">{t('you')}</div>
                <div className="msg-text"><p>{m.text}</p></div>
              </div>
            </div>
          ) : (
            <div className="msg" key={i}>
              <div className="msg-av ai"><Icon n="scale" s={16} sw={2} /></div>
              <div className="msg-body">
                <div className="msg-name">{t('ai_name')}</div>
                <div className="msg-text">{renderAiContent(m)}</div>
                <div className="msg-actions">
                  <button title="Copy" onClick={() => navigator.clipboard.writeText(m.text || m.data?.intro || '')}>
                    <Icon n="copy" s={15} />
                  </button>
                  <button title="Good response"><Icon n="thumbup" s={15} /></button>
                  <button title="Regenerate"><Icon n="refresh" s={15} /></button>
                </div>
              </div>
            </div>
          ))}
          {typing && (
            <div className="msg">
              <div className="msg-av ai"><Icon n="scale" s={16} sw={2} /></div>
              <div className="msg-body"><div className="typing"><span /><span /><span /></div></div>
            </div>
          )}
        </div>
      </div>
      <div className="chat-footer">
        <div style={{ maxWidth: 760, margin: '0 auto' }}>
          <Composer value={draft} onChange={setDraft} onSend={onSend} autofocus />
          <div className="chat-disclaimer">{t('disclaimer')}</div>
        </div>
      </div>
    </div>
  );
}

/* ---------- Companies с реальным API (auth'd) ---------- */
function CompaniesView({ go, currentUser }) {
  const [companies, setCompanies] = useState([]);
  const [activeId, setActiveId] = useState(null);
  const [loading, setLoading] = useState(true);
  const [showModal, setShowModal] = useState(false);
  const [form, setForm] = useState({ name: '', tin: '', tax_type: 'УСН', activity: '' });
  const [saving, setSaving] = useState(false);

  const GRADS = [
    'linear-gradient(145deg,#6D28D9,#4C1D95)',
    'linear-gradient(145deg,#4F46E5,#3730A3)',
    'linear-gradient(145deg,#2563EB,#1E40AF)',
    'linear-gradient(145deg,#0F766E,#134E4A)',
    'linear-gradient(145deg,#B45309,#92400E)',
  ];

  // Auth-aware API: если залогинен — /api/user/me/*, иначе — анонимный
  const api = currentUser
    ? { base: `${API_BASE}/api/user/me`, h: AUTH.authHeaders() }
    : { base: `${API_BASE}/api/user/${USER_ID}`, h: { 'Content-Type': 'application/json' } };

  async function load() {
    setLoading(true);
    try {
      const url = currentUser ? `${api.base}/companies` : api.base;
      const res = await fetch(url, { headers: api.h });
      if (res.ok) {
        const d = await res.json();
        setCompanies(d.companies || []);
        setActiveId(d.active_company || null);
      }
    } catch(e) {}
    setLoading(false);
  }

  useEffect(() => { load(); }, []);

  async function addCompany() {
    if (!form.name.trim()) return;
    setSaving(true);
    try {
      await fetch(`${api.base}/company`, {
        method: 'POST', headers: api.h,
        body: JSON.stringify(form)
      });
      setShowModal(false);
      setForm({ name: '', tin: '', tax_type: 'УСН', activity: '' });
      await load();
    } catch(e) {}
    setSaving(false);
  }

  async function deleteCompany(id) {
    if (!confirm('Удалить компанию?')) return;
    try {
      await fetch(`${api.base}/company/${id}`, { method: 'DELETE', headers: api.h });
      await load();
    } catch(e) {}
  }

  async function setActive(id) {
    try {
      await fetch(`${api.base}/active/${id}`, { method: 'POST', headers: api.h });
      setActiveId(id);
      await load();

  const displayList = companies.length > 0 ? companies : [

    { id: 'demo2', name: 'FAMILY BERRIES EXPORT', tin: '309 114 870', logo: 'FE', grad: GRADS[1], status: 'due', tax_type: 'ОСН', activity: 'Trade', act: 'Yesterday', vat: true },
    { id: 'demo3', name: 'FAMILY BERRIES TRADE', tin: '302 559 631', logo: 'FT', grad: GRADS[2], status: 'ok', tax_type: 'УСН', activity: 'Retail', act: '4 days ago', vat: false },
  ];

  return (
    <div className="view"><div className="wrap">
      <div className="page-head" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
        <div><h1>{t('my_companies')}</h1><p>{t('companies_sub')}</p></div>
        <button onClick={() => setShowModal(true)}
          style={{ height: 42, padding: '0 18px', borderRadius: 14, background: 'var(--ink)', color: '#fff', fontSize: 13, fontWeight: 700, display: 'flex', alignItems: 'center', gap: 8 }}>
          <Icon n="plus" s={16} /> {t('add_company')}
        </button>
      </div>

      <div className="stat-row">
        <div className="stat"><div className="sl"><Icon n="building" s={15} /> {t('st_entities')}</div><div className="sv">{displayList.length}</div><div className="sd">{t('st_all_active')}</div></div>
        <div className="stat"><div className="sl"><Icon n="shield" s={15} /> {t('st_compliant')}</div><div className="sv">{displayList.filter(c=>c.status==='ok').length}/{displayList.length}</div><div className="sd" style={{ color: 'var(--amber)' }}>{t('st_filing_due')}</div></div>
        <div className="stat"><div className="sl"><Icon n="doc" s={15} /> {t('st_documents')}</div><div className="sv">148</div><div className="sd up"><Icon n="trend" s={13} /> {t('st_this_week')}</div></div>
        <div className="stat"><div className="sl"><Icon n="calc" s={15} /> {t('st_vat')}</div><div className="sv">34.2M</div><div className="sd">{t('st_quarter')}</div></div>
      </div>

      {loading ? (
        <div style={{ padding: 40, textAlign: 'center', color: 'var(--muted)' }}>Загрузка...</div>
      ) : (
        <div className="co-grid" style={{ gridTemplateColumns: 'repeat(auto-fill,minmax(280px,1fr))' }}>
          {displayList.map((c, i) => {
            const initials = c.logo || c.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
            const grad = c.grad || GRADS[i % GRADS.length];
            const isActive = c.id === activeId;
            return (
              <div className="co-card" key={c.id}
                style={isActive ? { border: '2px solid var(--violet-400)', boxShadow: 'var(--sh-glow)' } : {}}

/* ════ SubscriptionView — тарифы + оплата ════ */
function SubscriptionView({ currentUser }) {
  const [plans, setPlans]       = useState([]);
  const [sub, setSub]           = useState(null);
  const [paying, setPaying]     = useState(null); // plan_id оплаты
  const [provider, setProvider] = useState('payme');
  const [loading, setLoading]   = useState(true);

  useEffect(() => {
    async function load() {
      try {
        const [pr, sr] = await Promise.all([
          fetch(`${API_BASE}/api/plans`),
          fetch(`${API_BASE}/api/subscription`, { headers: AUTH.authHeaders() }),
        ]);
        if (pr.ok) { const d = await pr.json(); setPlans(d.plans || []); }
        if (sr.ok) { setSub(await sr.json()); }
      } catch(e) {}
      setLoading(false);
    }
    load();
  }, []);

  async function startPayment(planId) {
    setPaying(planId);
    try {
      const res = await fetch(`${API_BASE}/api/payment/create`, {
        method: 'POST', headers: AUTH.authHeaders(),
        body: JSON.stringify({ plan_id: planId, provider }),
      });
      if (res.ok) {
        const d = await res.json();
        window.open(d.url, '_blank');
      }
    } catch(e) {}
    setPaying(null);
  }

  const PROVIDER_LOGOS = {
    payme: '💳 Payme', click: '🔵 Click', uzum: '🟠 Uzum Bank'
  };

  return (
    <div className="view"><div className="wrap">
      <div className="page-head">
        <h1>💎 Подписка</h1>
        <p>Выберите тариф и способ оплаты</p>
      </div>

      {/* Текущий статус */}
      {sub && (
        <div style={{ background: sub.active ? 'var(--green-bg)' : 'var(--violet-50)',
                      border: `1px solid ${sub.active ? '#1F9D6B33' : 'var(--violet-100)'}`,
                      borderRadius: 14, padding: '16px 20px', marginBottom: 24,
                      display: 'flex', alignItems: 'center', gap: 14 }}>
          <div style={{ fontSize: 28 }}>{sub.active ? '✅' : '🔓'}</div>
          <div>
            <div style={{ fontWeight: 700, fontSize: 15 }}>
              {sub.active ? `PRO · осталось ${sub.days_left} дн.` : 'Бесплатный тариф · 20 запросов/день'}
            </div>
            <div style={{ fontSize: 13, color: 'var(--muted)', marginTop: 3 }}>
              {sub.active ? `Истекает: ${sub.expires_at?.slice(0,10)}` : 'Перейдите на PRO для безлимита'}
            </div>
          </div>
        </div>
      )}

      {/* Выбор провайдера оплаты */}
      <div style={{ marginBottom: 20 }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--muted)', marginBottom: 10 }}>
          Способ оплаты
        </div>
        <div style={{ display: 'flex', gap: 10 }}>
          {Object.entries(PROVIDER_LOGOS).map(([p, label]) => (
            <button key={p} onClick={() => setProvider(p)}
              style={{ padding: '9px 16px', borderRadius: 10, fontSize: 13, fontWeight: 600,
                       border: `2px solid ${provider === p ? 'var(--violet-500)' : 'var(--line)'}`,
                       background: provider === p ? 'var(--violet-50)' : '#fff',
                       color: provider === p ? 'var(--violet-700)' : 'var(--ink-soft)',
                       cursor: 'pointer' }}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {/* Тарифные планы */}
      {loading ? (
        <div style={{ textAlign: 'center', padding: 40, color: 'var(--muted)' }}>Загрузка тарифов...</div>
      ) : (
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(240px,1fr))', gap: 16 }}>
          {plans.map(plan => {
            const isPro = plan.id !== 'free';
            const priceM = Math.round(plan.price / 1000);
            return (
              <div key={plan.id}
                style={{ background: isPro ? 'linear-gradient(145deg,#4C1D95,#6D28D9)' : 'var(--surface)',
                         border: isPro ? 'none' : '1px solid var(--line)',
                         borderRadius: 18, padding: '24px 20px',
                         color: isPro ? '#fff' : 'var(--ink)',
                         boxShadow: isPro ? 'var(--sh-glow)' : 'var(--sh-sm)' }}>
                <div style={{ fontSize: 18, fontWeight: 800, marginBottom: 6 }}>{plan.name}</div>
                <div style={{ fontSize: 28, fontWeight: 900, marginBottom: 4 }}>
                  {priceM > 0 ? `${priceM}K` : '0'}
                  <span style={{ fontSize: 14, fontWeight: 500, opacity: .7 }}> сум/{plan.duration === 30 ? 'мес' : 'год'}</span>
                </div>
                <div style={{ fontSize: 13, opacity: .8, marginBottom: 20 }}>
                  {plan.requests === 'Безлимит' ? '∞ запросов/день' : `${plan.requests} запросов/день`}
                </div>
                <button onClick={() => isPro && startPayment(plan.id)}
                  disabled={!isPro || paying === plan.id}
                  style={{ width: '100%', height: 40, borderRadius: 10, fontSize: 13, fontWeight: 700,
                           background: isPro ? 'rgba(255,255,255,.2)' : 'var(--violet-500)',
                           color: isPro ? '#fff' : '#fff',
                           border: isPro ? '1.5px solid rgba(255,255,255,.3)' : 'none',
                           cursor: isPro ? 'pointer' : 'default',
                           opacity: (!isPro || paying === plan.id) && isPro ? 0.6 : 1 }}>
                  {!isPro ? 'Текущий тариф' : paying === plan.id ? 'Перенаправление...' : `Оплатить через ${PROVIDER_LOGOS[provider].split(' ')[1]}`}
                </button>
              </div>
            );
          })}
        </div>
      )}

      <div style={{ marginTop: 24, fontSize: 12, color: 'var(--muted)', lineHeight: 1.7 }}>
        После оплаты через Payme / Click / Uzum Bank подписка активируется автоматически.<br />
        Вопросы: <a href="https://t.me/buxgalter_ai_uzbot" style={{ color: 'var(--violet-500)' }}>@buxgalter_ai_uzbot</a>
      </div>
    </div></div>
  );
}

/* ════ BottomTabBar — мобильная навигация снизу ════ */
function BottomTabBar({ view, go }) {
  const tabs = [
    { id: 'dashboard', icon: 'dashboard', label: 'Главная' },
    { id: 'newchat',   icon: 'plus',      label: 'Чат',    primary: true },
    { id: 'companies', icon: 'building',  label: 'Фирмы' },
    { id: 'calendar',  icon: 'calendar',  label: 'Кал.' },
    { id: 'support',   icon: 'help',      label: 'Ещё' },
  ];
  return (
    <nav className="mob-tabbar" aria-label="Навигация">
      <div className="mob-tabbar-inner">
        {tabs.map(tab => (
          <button key={tab.id}
            className={'mob-tab' + (tab.primary ? ' primary' : view === tab.id ? ' active' : '')}
            onClick={() => go(tab.id)}
            aria-label={tab.label}>
            <Icon n={tab.icon} s={tab.primary ? 22 : 20} />
            {!tab.primary && <span>{tab.label}</span>}
          </button>
        ))}
      </div>
    </nav>
  );
}

Object.assign(window, { ChatView, CompaniesView, Placeholder, SubscriptionView, BottomTabBar });
</script>

<script type="text/babel">

// ── Утилиты авторизации ──────────────────────────────────
const AUTH = {
  getToken: () => localStorage.getItem('bux_token'),
  setToken: (t) => localStorage.setItem('bux_token', t),
  clearToken: () => localStorage.removeItem('bux_token'),
  getUser: () => { try { return JSON.parse(localStorage.getItem('bux_user') || 'null'); } catch { return null; } },
  setUser: (u) => localStorage.setItem('bux_user', JSON.stringify(u)),
  clearUser: () => localStorage.removeItem('bux_user'),
  authHeaders: () => ({ 'Content-Type': 'application/json', 'Authorization': `Bearer ${AUTH.getToken()}` }),
  logout: () => { AUTH.clearToken(); AUTH.clearUser(); window.location.href = '/'; },
};

// При загрузке — проверяем token в URL (после redirect от Google)
(function() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  const error = params.get('error');
  if (token) {
    AUTH.setToken(token);
    window.history.replaceState({}, '', '/');
  }
  if (error) {
    console.error('Auth error:', error);
    window.history.replaceState({}, '', '/');
  }
})();

<!-- ════ APP ROOT — с авторизацией ════ -->
<script type="text/babel">

function App() {
  const [view, setView] = useState('dashboard');
  const [lang, setLangState] = useState(() => localStorage.getItem('aiacc_lang') || 'RU');
  const [draft, setDraft] = useState('');
  const [messages, setMessages] = useState([]);
  const [typing, setTyping] = useState(false);
  const [activeChat, setActiveChat] = useState(null);
  const [currentUser, setCurrentUser] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);
  const [sessionId, setSessionId] = useState(() => 'sess_' + Date.now());
  const [requestsRemaining, setRequestsRemaining] = useState(20);
  const [chatSessions, setChatSessions] = useState([]);
  const [sidebarOpen, setSidebarOpen] = useState(false);

  window.__LANG = lang;
  const setLang = (l) => { window.__LANG = l; localStorage.setItem('aiacc_lang', l); setLangState(l); };

  // Проверка авторизации при загрузке
  useEffect(() => {
    async function checkAuth() {
      const token = AUTH.getToken();
      if (!token) { setAuthLoading(false); return; }
      try {
        const res = await fetch(API_BASE + '/auth/me', { headers: AUTH.authHeaders() });
        if (res.ok) {
          const user = await res.json();
          AUTH.setUser(user);
          setCurrentUser(user);
          try {
            const subRes = await fetch(API_BASE + '/api/subscription', { headers: AUTH.authHeaders() });
            if (subRes.ok) {
              const sub = await subRes.json();
              if (sub.plan === 'free') setRequestsRemaining(20);
              else setRequestsRemaining(999);
            }
          } catch(_) {}
          try {
            const sessRes = await fetch(API_BASE + '/api/chat/sessions', { headers: AUTH.authHeaders() });
            if (sessRes.ok) {
              const sd = await sessRes.json();
              setChatSessions((sd.sessions || []).slice(0, 8));
            }
          } catch(_) {}
        } else {
          AUTH.clearToken();
          AUTH.clearUser();
        }
      } catch(e) {}
      setAuthLoading(false);
    }
    checkAuth();
  }, []);

  // go — с закрытием sidebar на мобиле
  const go = (v) => {
    setSidebarOpen(false);
    if (v === 'newchat') {
      setMessages([]); setActiveChat(null); setView('chat'); setDraft('');
      setSessionId('sess_' + Date.now());
    } else setView(v);
  };

  const openChat = (chatKey) => {
    const title = t(chatKey);
    setMessages([]); setActiveChat(chatKey);
    setSessionId('sess_' + Date.now());
    setView('chat'); setDraft('');
    setTimeout(() => send(title), 50);
  };

  // Отправка с авторизацией
  const send = async (preset) => {
    const text = (typeof preset === 'string' ? preset : draft).trim();
    if (!text) return;
    setView('chat'); setDraft(''); setActiveChat(null);
    setMessages(m => [...m, { role: 'user', text }]);
    setTyping(true);
    try {
      const endpoint = currentUser ? '/api/chat/v2' : '/api/chat';
      const headers = currentUser ? AUTH.authHeaders() : { 'Content-Type': 'application/json' };
      const body = currentUser
        ? JSON.stringify({ message: text, session_id: sessionId })
        : JSON.stringify({ user_id: USER_ID, message: text });
      const res = await fetch(API_BASE + endpoint, { method: 'POST', headers, body });
      setTyping(false);
      if (res.status === 429) {
        const d = await res.json();
        setMessages(m => [...m, { role: 'ai', text: '⚠️ ' + d.error }]);
        return;
      }
      if (res.ok) {
        const data = await res.json();
        setMessages(m => [...m, { role: 'ai', text: data.response || '' }]);
        if (data.requests_remaining !== undefined) setRequestsRemaining(data.requests_remaining);
      } else {
        setMessages(m => [...m, { role: 'ai', text: '⚠️ Ошибка сервера. Попробуйте ещё раз.' }]);
      }
    } catch(e) {
      setTyping(false);
      setMessages(m => [...m, { role: 'ai', text: '⚠️ Нет соединения с сервером.' }]);
    }
  };

  if (authLoading) {
    return (
      <div style={{ height:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'#F6F5F9' }}>
        <div style={{ textAlign:'center' }}>
          <div style={{ width:48, height:48, borderRadius:14, background:'linear-gradient(150deg,#7C3AED,#4C1D95)', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 16px', boxShadow:'0 10px 30px -8px rgba(109,40,217,.4)' }}>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          </div>
          <div style={{ fontSize:13, color:'#847E92', fontWeight:600 }}>Загрузка...</div>
        </div>
      </div>
    );
  }

  if (!currentUser) {
    return <LoginScreen />;
  }

  return (
    <div className="app">
      <Sidebar view={view} go={go} activeChat={activeChat} openChat={openChat}
        currentUser={currentUser} requestsRemaining={requestsRemaining}
        isOpen={sidebarOpen} onClose={() => setSidebarOpen(false)} />
      <div className="main">
        <Header lang={lang} setLang={setLang} currentUser={currentUser} go={go}
          onMenuOpen={() => setSidebarOpen(true)} />
        {view === 'chat'
          ? <ChatView messages={messages} draft={draft} setDraft={setDraft} onSend={send} typing={typing} />
          : <div className="content">
              {view === 'dashboard' && <Dashboard draft={draft} setDraft={setDraft} onSend={send} go={go} />}
              {view === 'companies' && <CompaniesView go={go} currentUser={currentUser} />}
              {view === 'calendar' && <CalendarView currentUser={currentUser} />}
              {view === 'learn' && <LearningView />}
              {view === 'subscription' && <SubscriptionView currentUser={currentUser} />}
              {['docs','kb','notes','settings'].includes(view) && <Placeholder view={view} go={go} />}
              {view === 'support' && <SupportView go={go} currentUser={currentUser} />}
            </div>}
        <BottomTabBar view={view} go={go} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
